<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AIR Support - Comunitate & Recuperare</title>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // Configurația ta Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyBz75HiehF3zMaEPxkX5-_vq9i71lx5uiA",
            authDomain: "airsupport-42ebd.firebaseapp.com",
            projectId: "airsupport-42ebd",
            storageBucket: "airsupport-42ebd.firebasestorage.app",
            messagingSenderId: "56777999661",
            appId: "1:56777999661:web:b6ce12e056d64dc4f6bfa4"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // --- FUNCȚIA TRIMITERE MESAJ CHAT ---
        window.sendMessage = async () => {
            const input = document.getElementById('chat-input');
            const user = document.getElementById('username').value || "Vizitator";
            if (input.value.trim() !== "") {
                try {
                    await addDoc(collection(db, "messages"), {
                        text: input.value,
                        user: user,
                        timestamp: serverTimestamp()
                    });
                    input.value = "";
                } catch (e) { alert("Eroare: Verifică dacă ai activat Firestore în Test Mode!"); }
            }
        };

        // Ascultă mesajele noi în timp real
        onSnapshot(query(collection(db, "messages"), orderBy("timestamp", "asc")), (snapshot) => {
            const chatWin = document.getElementById('chat-window');
            chatWin.innerHTML = "";
            snapshot.forEach(doc => {
                const data = doc.data();
                chatWin.innerHTML += `<div style="margin-bottom:8px;"><strong>${data.user}:</strong> ${data.text}</div>`;
            });
            chatWin.scrollTop = chatWin.scrollHeight;
        });

        // --- FUNCȚIA PUBLICARE ARTICOL (BLOG) ---
        window.publishArticle = async () => {
            const title = document.getElementById('art-title').value;
            const content = document.getElementById('art-content').value;
            const pass = prompt("Introdu parola de administrator:");
            
            if(pass === "AIR2024") {
                try {
                    await addDoc(collection(db, "articles"), {
                        title: title,
                        content: content,
                        timestamp: serverTimestamp()
                    });
                    alert("Articol publicat cu succes!");
                    document.getElementById('art-title').value = "";
                    document.getElementById('art-content').value = "";
                    showPage('page-edu'); // Te trimite la pagina de articole
                } catch (e) { alert("Eroare la publicare!"); }
            } else { 
                alert("Parolă incorectă! Doar adminul poate posta."); 
            }
        };

        // Încarcă articolele automat
        onSnapshot(query(collection(db, "articles"), orderBy("timestamp", "desc")), (snapshot) => {
            const blogCont = document.getElementById('blog-container');
            blogCont.innerHTML = "";
            if (snapshot.empty) {
                blogCont.innerHTML = "<p>Încă nu sunt articole publicate.</p>";
            }
            snapshot.forEach(doc => {
                const data = doc.data();
                const date = data.timestamp ? data.timestamp.toDate().toLocaleDateString() : "Recent";
                blogCont.innerHTML += `
                    <div class="card">
                        <h2 style="color:var(--primary);">${data.title}</h2>
                        <p style="white-space: pre-wrap;">${data.content}</p>
                        <hr style="border:0; border-top:1px solid #eee;">
                        <small style="color:#888;">Publicat la: ${date}</small>
                    </div>`;
            });
        });

        // Funcția de navigare între pagini
        window.showPage = (pageId) => {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            
            // Inchidem meniul pe mobil daca e cazul (optional)
            window.scrollTo(0,0);
        };
    </script>
