<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AIR Support | Premium Management & Cleaning</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <script type="text/javascript">
        (function() {
            emailjs.init("D4Gbqc3jypgDuA6E6");
        })();
    </script>

    <style>
        :root {
            --gold: #d4af37;
            --gold-bright: #f9e29d;
            --dark: #050505;
            --card-bg: #111111;
            --border: rgba(212, 175, 55, 0.3);
        }

        body {
            margin: 0; padding: 0; background-color: var(--dark); color: #fff;
            font-family: 'Poppins', sans-serif; overflow-x: hidden;
        }

        nav {
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px 5%; background: #000;
            border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 9999;
        }
        .logo-container { display: flex; align-items: center; gap: 10px; cursor: pointer; }
        .logo-icon {
            width: 35px; height: 35px; background: var(--gold);
            border-radius: 8px; display: flex; align-items: center; justify-content: center;
        }
        .nav-links { display: flex; gap: 15px; }
        .nav-link { 
            color: #fff; text-decoration: none; font-size: 12px; font-weight: 600; 
            text-transform: uppercase; cursor: pointer; padding: 5px 10px;
        }
        .nav-link:hover { color: var(--gold); }

        main { padding: 40px 5%; max-width: 1200px; margin: 0 auto; }
        
        .page { display: none; } 
        .active-page { display: block !important; }

        .hero { text-align: center; margin-bottom: 50px; }
        .hero h1 { font-family: 'Playfair Display', serif; font-size: 3rem; color: var(--gold); }

        .card {
            background: var(--card-bg); padding: 30px; border-radius: 15px;
            border: 1px solid var(--border); text-align: center;
        }

        .gold-btn {
            background: var(--gold); color: #000; border: none; padding: 15px;
            border-radius: 8px; font-weight: 800; cursor: pointer; width: 100%;
            margin-top: 10px; text-transform: uppercase;
        }

        input, select {
            width: 100%; padding: 12px; background: #222;
            border: 1px solid var(--border); border-radius: 8px; color: white;
            margin-bottom: 15px; box-sizing: border-box;
        }

        .price-display { font-size: 2.5rem; color: var(--gold); font-weight: 700; display: block; margin: 10px 0; }
    </style>
</head>
<body>

    <nav>
        <div class="logo-container" onclick="showPage('airbnb')">
            <div class="logo-icon">🧹</div>
            <div style="line-height: 1;">
                <span style="font-weight: 800; color: var(--gold);">AIR</span><br>
                <span style="font-size: 10px; color: #fff;">SUPPORT</span>
            </div>
        </div>
        <div class="nav-links">
            <div class="nav-link" onclick="showPage('airbnb')">Airbnb</div>
            <div class="nav-link" onclick="showPage('cleaning')">Curățenie</div>
            <div class="nav-link" onclick="showPage('contact')">Contact</div>
        </div>
    </nav>

    <main>
        <div id="airbnb" class="page active-page">
            <div class="hero"><h1>Management Airbnb</h1></div>
            <div class="card" style="max-width: 400px; margin: 0 auto;">
                <h3>Estimează Venit</h3>
                <input type="number" id="p-air" value="450" oninput="calcA()">
                <input type="range" id="r-nopti" min="1" max="30" value="22" oninput="calcA()">
                <span class="price-display" id="res-air">7.920 RON</span>
                <button class="gold-btn" onclick="showPage('contact')">Solicită Ofertă</button>
            </div>
        </div>

        <div id="cleaning" class="page">
            <div class="hero"><h1>Curățenie Premium</h1></div>
            <div class="card" style="max-width: 400px; margin: 0 auto;">
                <h3>Preț estimativ</h3>
                <select id="c-type" onchange="calcC()">
                    <option value="180">Garsonieră</option>
                    <option value="280" selected>Apartament 2 camere</option>
                    <option value="400">Apartament 3 camere</option>
                    <option value="800">Vilă</option>
                </select>
                <span class="price-display" id="res-clean">280 RON</span>
                <button class="gold-btn" onclick="showPage('contact')">Rezervă Acum</button>
            </div>
        </div>

        <div id="contact" class="page">
            <div class="card" style="max-width: 500px; margin: 0 auto; text-align: left;">
                <h2 style="text-align: center; color: var(--gold);">Contactează-ne</h2>
                
                <label>Nume Client:</label>
                <input type="text" id="client_name" placeholder="Ex: Popescu Ion" required>
                
                <label>Email Client:</label>
                <input type="email" id="client_email" placeholder="Ex: nume@email.com" required>
                
                <label>Telefon Client:</label>
                <input type="text" id="client_phone" placeholder="Ex: 0722 000 000" required>
                
                <label>Serviciu Solicitat:</label>
                <select id="client_service">
                    <option value="Management Airbnb">Management Airbnb</option>
                    <option value="Curatenie Locuinta">Curățenie Locuință</option>
                    <option value="Curatenie dupa Constructor">Curățenie după Constructor</option>
                    <option value="Pachet Complet">Management + Curățenie</option>
                </select>

                <button class="gold-btn" id="btn-submit" onclick="sendEmail()">Trimite Solicitarea</button>
                <p id="status-msg" style="margin-top: 15px; text-align: center; font-weight: bold;"></p>
            </div>
        </div>
    </main>

    <script>
        function showPage(pageId) {
            const allPages = document.getElementsByClassName('page');
            for (let i = 0; i < allPages.length; i++) { allPages[i].style.display = 'none'; }
            document.getElementById(pageId).style.display = 'block';
            window.scrollTo(0,0);
        }

        function calcA() {
            let p = document.getElementById('p-air').value;
            let n = document.getElementById('r-nopti').value;
            document.getElementById('res-air').innerText = Math.floor((p * n) * 0.8).toLocaleString() + " RON";
        }

        function calcC() {
            let base = document.getElementById('c-type').value;
            document.getElementById('res-clean').innerText = base + " RON";
        }

        function sendEmail() {
            const btn = document.getElementById('btn-submit');
            const status = document.getElementById('status-msg');
            
            // Variabilele trimise catre EmailJS
            const templateParams = {
                client_name: document.getElementById('client_name').value,
                client_email: document.getElementById('client_email').value,
                client_phone: document.getElementById('client_phone').value,
                client_service: document.getElementById('client_service').value
            };

            if(!templateParams.client_name || !templateParams.client_phone || !templateParams.client_email) {
                status.innerText = "Te rugăm să completezi toate câmpurile!";
                status.style.color = "red";
                return;
            }

            btn.innerText = "Se trimite...";
            btn.disabled = true;

            emailjs.send("service_5wk6asq", "template_zyofb16", templateParams)
                .then(function() {
                   status.innerText = "Mesaj trimis! Verifică e-mail-ul.";
                   status.style.color = "gold";
                   btn.innerText = "Trimis!";
                }, function(error) {
                   status.innerText = "Eroare la trimitere.";
                   status.style.color = "red";
                   btn.disabled = false;
                   btn.innerText = "Reîncearcă";
                });
        }
    </script>
</body>
</html>
