<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AIR Support | Premium Management & Cleaning</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #d4af37; --gold-bright: #f9e29d; --dark: #050505; --card-bg: rgba(25, 25, 25, 0.8); --border: rgba(212, 175, 55, 0.3); }
        body { margin: 0; padding: 0; background-color: var(--dark); color: #fff; font-family: 'Poppins', sans-serif; scroll-behavior: smooth; overflow-x: hidden; }
        
        /* NAVIGATION */
        nav { display: flex; justify-content: space-between; align-items: center; padding: 20px 8%; background: rgba(0,0,0,0.9); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 1000; backdrop-filter: blur(10px); }
        .logo-container { display: flex; align-items: center; gap: 15px; cursor: pointer; text-decoration: none; }
        .logo-icon { width: 45px; height: 45px; background: linear-gradient(135deg, var(--gold), #8a6d3b); border-radius: 10px; display: flex; align-items: center; justify-content: center; box-shadow: 0 5px 15px rgba(212, 175, 55, 0.4); border: 1px solid var(--gold-bright); }
        .logo-icon::after { content: '🧹'; font-size: 20px; }
        .nav-links { display: flex; gap: 30px; }
        .nav-link { color: #ccc; text-decoration: none; font-size: 14px; font-weight: 600; text-transform: uppercase; cursor: pointer; transition: 0.3s; }
        .nav-link:hover { color: var(--gold); }

        main { padding: 60px 8%; max-width: 1200px; margin: 0 auto; }
        .page { display: none; animation: fadeInUp 0.6s ease forwards; }
        .active { display: block; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

        .card { background: var(--card-bg); padding: 40px; border-radius: 20px; border: 1px solid var(--border); box-shadow: 0 20px 40px rgba(0,0,0,0.6); margin-bottom: 30px; }
        .gold-btn { background: linear-gradient(135deg, var(--gold), #8a6d3b); color: #000; border: none; padding: 18px 30px; border-radius: 12px; font-weight: 800; text-transform: uppercase; cursor: pointer; width: 100%; transition: 0.3s; margin-top: 20px; }
        .gold-btn:hover { transform: scale(1.02); box-shadow: 0 0 20px var(--gold); }
        
        input, select { width: 100%; padding: 15px; background: rgba(255,255,255,0.05); border: 1px solid var(--border); border-radius: 10px; color: white; margin: 10px 0 20px; box-sizing: border-box; outline: none; }
        input:focus { border-color: var(--gold); }
        .price-display { font-size: 2.5rem; color: var(--gold); font-weight: 700; display: block; margin: 15px 0; text-align: center; }
        
        label { font-size: 0.9rem; color: #aaa; }
    </style>
</head>
<body>

    <nav>
        <div class="logo-container" onclick="showPage('airbnb')">
            <div class="logo-icon"></div>
            <div style="line-height: 1;">
                <span style="font-weight: 800; font-size: 20px; color: var(--gold);">AIR</span><br>
                <span style="font-weight: 300; font-size: 14px; color: #fff; letter-spacing: 2px;">SUPPORT</span>
            </div>
        </div>
        <div class="nav-links">
            <span class="nav-link" onclick="showPage('airbnb')">Airbnb</span>
            <span class="nav-link" onclick="showPage('cleaning')">Curățenie</span>
            <span class="nav-link" onclick="showPage('contact')">Contact</span>
        </div>
    </nav>

    <main>
        <div id="airbnb" class="page active">
            <div class="card" style="text-align: center;">
                <h1 style="font-family: 'Playfair Display', serif; font-size: 2.5rem; color: var(--gold);">Management Airbnb Premium</h1>
                <p>Estimează-ți venitul lunar net:</p>
                <div style="max-width: 400px; margin: 0 auto; text-align: left;">
                    <label>Tarif pe noapte (RON)</label>
                    <input type="number" id="p-air" value="450" oninput="calc()">
                    <label>Grad de ocupare: <span id="l-nopti" style="color:var(--gold)">22 zile</span></label>
                    <input type="range" id="r-nopti" min="1" max="30" value="22" oninput="calc()">
                </div>
                <span class="price-display" id="res-air">7.920 RON</span>
                <p style="font-size: 0.8rem; color: #888;">*După comisionul de management de 20%</p>
                <button class="gold-btn" onclick="showPage('contact')">Vreau Consultanță</button>
            </div>
        </div>
