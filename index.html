<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AIR Support | Premium Management & Cleaning</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <script type="text/javascript">
        (function() {
            emailjs.init("D4Gbqc3jypgDuA6E6");
        })();
    </script>

    <style>
        :root {
            --gold: #d4af37;
            --gold-bright: #f9e29d;
            --dark: #050505;
            --card-bg: #111111;
            --border: rgba(212, 175, 55, 0.3);
        }

        body {
            margin: 0; padding: 0; background-color: var(--dark); color: #fff;
            font-family: 'Poppins', sans-serif; overflow-x: hidden;
        }

        /* NAVIGATION */
        nav {
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px 5%; background: #000;
            border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 9999;
        }
        .logo-container { display: flex; align-items: center; gap: 10px; cursor: pointer; }
        .logo-icon {
            width: 35px; height: 35px; background: var(--gold);
            border-radius: 8px; display: flex; align-items: center; justify-content: center;
        }
        .nav-links { display: flex; gap: 15px; }
        .nav-link { 
            color: #fff; text-decoration: none; font-size: 12px; font-weight: 600; 
            text-transform: uppercase; cursor: pointer; padding: 5px 10px;
        }
        .nav-link:hover { color: var(--gold); }

        main { padding: 40px 5%; max-width: 1200px; margin: 0 auto; }
        
        /* FIX PAGINI */
        .page { display: none; } /* Toate ascunse default */
        .active-page { display: block !important; } /* Doar cea activa se vede */

        .hero { text-align: center; margin-bottom: 50px; }
        .hero h1 { 
            font-family: 'Playfair Display', serif; font-size: 3rem;
            color: var(--gold); margin-bottom: 10px;
        }

        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 30px; }
        .card {
            background: var(--card-bg); padding: 30px; border-radius: 15px;
            border: 1px solid var(--border); text-align: center;
        }

        .gold-btn {
            background: var(--gold); color: #000; border: none; padding: 15px;
            border-radius: 8px; font-weight: 800; cursor: pointer; width: 100%;
            margin-top: 20px; text-transform: uppercase;
        }

        input, select {
            width: 100%; padding: 12px; background: #222;
            border: 1px solid var(--border); border-radius: 8px; color: white;
            margin-bottom: 15px; box-sizing: border-box;
        }

        .price-display { font-size: 2.5rem; color: var(--gold); font-weight: 700; margin: 10px 0; display: block; }

        /* PORTFOLIO */
        .portfolio-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        .portfolio-item { height: 200px; border-radius: 10px; overflow: hidden; border: 1px solid var(--border); position: relative; }
        .portfolio-img { width: 100%; height: 100%; background-size: cover; background-position: center; }
        .portfolio-text { position: absolute; bottom: 10px; left: 10px; color: var(--gold); font-weight: bold; }
    </style>
</head>
<body>

    <nav>
        <div class="logo-container" onclick="showPage('airbnb')">
            <div class="logo-icon">🧹</div>
            <div style="line-height: 1;">
                <span style="font-weight: 800; color: var(--gold);">AIR</span><br>
                <span style="font-size: 10px; color: #fff;">SUPPORT</span>
            </div>
        </div>
        <div class="nav-links">
            <div class="nav-link" onclick="showPage('airbnb')">Airbnb</div>
            <div class="nav-link" onclick="showPage('cleaning')">Curățenie</div>
            <div class="nav-link" onclick="showPage('portfolio')">Portofoliu</div>
            <div class="nav-link" onclick="showPage('contact')">Contact</div>
        </div>
    </nav>

    <main>
        <div id="airbnb" class="page active-page">
            <div class="hero">
                <h1>Elite Airbnb</h1>
                <p>Management premium pentru proprietatea ta din Roman.</p>
            </div>
            <div class="grid">
                <div class="card">
                    <h3>Calculator Profit</h3>
                    <label>Preț Noapte (RON)</label>
                    <input type="number" id="p-air" value="450" oninput="calcA()">
                    <label>Zile ocupate: <span id="l-nopti">22</span></label>
                    <input type="range" id="r-nopti" min="1" max="30" value="22" oninput="calcA()">
                    <span class="price-display" id="res-air">7.920 RON</span>
                    <button class="gold-btn" onclick="showPage('contact')">Vreau Management</button>
                </div>
            </div>
        </div>

        <div id="cleaning" class="page">
            <div class="hero">
                <h1>Curățenie VIP</h1>
                <p>Standarde de lux la tine acasă.</p>
            </div>
            <div class="grid">
                <div class="card">
                    <h3>Estimator Preț</h3>
                    <select id="c-type" onchange="calcC()">
                        <option value="180">Garsonieră</option>
                        <option value="280" selected>Apartament 2 camere</option>
                        <option value="400">Apartament 3 camere</option>
                        <option value="800">Vilă</option>
                    </select>
                    <select id="c-pack" onchange="calcC()">
                        <option value="1">Standard</option>
                        <option value="1.7">Generală</option>
                    </select>
                    <span class="price-display" id="res-clean">280 RON</span>
                    <button class="gold-btn" onclick="showPage('contact')">Rezervă acum</button>
                </div>
            </div>
        </div>

        <div id="portfolio" class="page">
            <div class="hero"><h1>Portofoliu</h1></div>
            <div class="portfolio-grid">
                <div class="portfolio-item">
                    <div class="portfolio-img" style="background-image: url('https://images.unsplash.com/photo-1502672260266-1c1ef2d93688?w=400');"></div>
                    <div class="portfolio-text">Apartament Roman</div>
                </div>
                <div class="portfolio-item">
                    <div class="portfolio-img" style="background-image: url('https://images.unsplash.com/photo-1522708323590-d24dbb6b0267?w=400');"></div>
                    <div class="portfolio-text">Penthouse Lux</div>
                </div>
            </div>
        </div>

        <div id="contact" class="page">
            <div class="card" style="max-width: 500px; margin: 0 auto;">
                <h2>Contact</h2>
                <input type="text" id="from_name" placeholder="Numele tău">
                <input type="text" id="user_phone" placeholder="Telefon">
                <select id="service_type">
                    <option>Management Airbnb</option>
                    <option>Curățenie Rezidențială</option>
                </select>
                <button class="gold-btn" id="btn-submit" onclick="sendEmail()">Trimite</button>
                <p id="status-msg" style="margin-top: 15px;"></p>
            </div>
        </div>
    </main>

    <script>
        // NAVIGARE - REPARATA RADICAL
        function showPage(pageId) {
            // 1. Ascunde absolut tot ce are clasa 'page'
            const allPages = document.getElementsByClassName('page');
            for (let i = 0; i < allPages.length; i++) {
                allPages[i].style.display = 'none';
                allPages[i].classList.remove('active-page');
            }
            
            // 2. Afiseaza doar pagina ceruta
            const selectedPage = document.getElementById(pageId);
            if(selectedPage) {
                selectedPage.style.display = 'block';
                selectedPage.classList.add('active-page');
            }
            window.scrollTo(0,0);
        }

        function calcA() {
            let p = document.getElementById('p-air').value;
            let n = document.getElementById('r-nopti').value;
            document.getElementById('l-nopti').innerText = n;
            document.getElementById('res-air').innerText = Math.floor((p * n) * 0.8).toLocaleString() + " RON";
        }

        function calcC() {
            let base = document.getElementById('c-type').value;
            let mult = document.getElementById('c-pack').value;
            document.getElementById('res-clean').innerText = Math.floor(base * mult).toLocaleString() + " RON";
        }

        function sendEmail() {
            const btn = document.getElementById('btn-submit');
            const status = document.getElementById('status-msg');
            const name = document.getElementById('from_name').value;
            const phone = document.getElementById('user_phone').value;
            const service = document.getElementById('service_type').value;

            if(!name || !phone) {
                status.innerText = "Bagă numele și telefonul!";
                status.style.color = "red";
                return;
            }

            btn.innerText = "Se trimite...";
            emailjs.send("service_5wk6asq", "template_zyofb16", {
                from_name: name,
                user_phone: phone,
                service_type: service
            }).then(() => {
                status.innerText = "Trimis cu succes!";
                status.style.color = "gold";
                btn.innerText = "GATA!";
            });
        }
    </script>
</body>
</html>
